name: CI

on:
  push:
    branches:
      - sams-dev
      - main
  pull_request:
    branches:
      - sams-dev
      - main

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL != '' && secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET != '' && secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret-please-override-in-repo-secrets' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/postgres' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests (if present)
        run: npm test || echo "No tests found"
