services:
  db:
    image: postgres:16-alpine
    container_name: scholarsync-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: scholarsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d scholarsync']
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scholarsync-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/scholarsync?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change_me_before_production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RUN_MIGRATIONS: 'true'
      RUN_SEED: 'false'

volumes:
  postgres_data:
